<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Ingreso | Sistema de Entregables de Docentes</title>
  <style>
    :root{
      --brand-dark:#0b3a2a;
      --brand-dark-2:#0e3f2f;
      --brand-accent:#c8d200;
      --brand-bg:#f4f7f5;
    }
    body{ background: var(--brand-bg); }
    .brand-hero{
      height: 160px;
      background: linear-gradient(6deg, var(--brand-dark), var(--brand-dark-2));
      border-bottom: 4px solid var(--brand-accent);
    }
    .login-card{
      margin-top: -70px;
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,.12);
    }
    .btn-primary{
      background-color: var(--brand-dark);
      border-color: var(--brand-dark);
    }
    .btn-primary:hover{
      background-color:#092f22; border-color:#092f22;
    }
    .brand-accent-bar{
      height: 4px; background: var(--brand-accent); border-radius: 2px;
    }
  </style>
</head>
{% load static %}
<body>
  <header class="brand-hero"></header>

  <div class="container" style="max-width:520px">
    <div class="card login-card p-4 p-md-5 bg-white">
      <div class="mb-3 text-center">
        <img src="{% static 'img/logocecar.png' %}" alt="CECAR" style="height:56px; object-fit:contain">
        <h3 class="mb-1 mt-2" style="color:var(--brand-dark)">Gestor Digital de Evidencias</h3>
        <label class="form-label">Ingeniería de Sistemas</label>
        <div class="brand-accent-bar mx-auto" style="width:120px"></div>
      </div>

      {% for m in messages %}<div class="alert alert-{{ m.tags }}">{{ m }}</div>{% endfor %}

      <form method="post" action="/auth/send-link">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Correo institucional</label>
          <input type="email" required name="email" class="form-control form-control-lg"
                 placeholder="nombre@tudominio.edu.co">
        </div>
        <button class="btn btn-primary btn-lg w-100">Enviar enlace de acceso</button>
      </form>

      <p class="mt-3 small text-muted text-center">
        En desarrollo, el enlace se muestra en la consola del servidor.
      </p>
    </div>
  </div>
</body>
</html>
